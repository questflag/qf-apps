name: qf-app-infra

services:

  infra-postgres:
    image: ${POSTGRES_IMAGE}
    container_name: infra-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Configs/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  infra-redis:
    image: ${REDIS_IMAGE}
    container_name: infra-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  infra-kafka:
    image: ${KAFKA_IMAGE}
    container_name: infra-kafka
    ports:
      - "9092:9092"
      - "19092:19092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_LISTENERS=INTERNAL://:9092,EXTERNAL://:19092,CONTROLLER://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://infra-kafka:9092,EXTERNAL://localhost:19092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@infra-kafka:9094
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_CFG_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_CFG_QUORUM_VOTERS=1@infra-kafka:9094
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
    volumes:
      - kafka_data:/bitnami/kafka

  infra-minio:
    image: ${MINIO_IMAGE}
    container_name: infra-minio
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    volumes:
      - minio_data:/data

  infra-qdrant:
    image: ${QDRANT_IMAGE}
    container_name: infra-qdrant
    ports:
      - "${QDRANT_HTTP_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  infra-etcd:
    image: ${ETCD_IMAGE}
    container_name: infra-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://infra-etcd:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd

  infra-milvus:
    image: ${MILVUS_IMAGE}
    container_name: infra-milvus
    command: [ "milvus", "run", "standalone" ]
    environment:
      ETCD_ENDPOINTS: ${MILVUS_ETCD_ENDPOINTS}
      MINIO_ADDRESS: ${MILVUS_MINIO_ADDRESS}
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MILVUS_PORT}:19530"
      - "${MILVUS_WEB_PORT}:9091"
    depends_on:
      - infra-etcd
      - infra-minio
    volumes:
      - milvus_data:/var/lib/milvus

  infra-neo4j:
    image: ${NEO4J_IMAGE}
    container_name: infra-neo4j
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_BOLT_PORT}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
    volumes:
      - neo4j_data:/data

  infra-otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE}
    container_name: infra-otel-collector
    command: [ "--config=/etc/otel-collector.yml" ]
    volumes:
      - ./Configs/otel-collector.yml:/etc/otel-collector.yml
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT}:4318"
      - "${OTEL_COLLECTOR_METRICS_PORT}:8889"

  infra-prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: infra-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./Configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  infra-grafana:
    image: ${GRAFANA_IMAGE}
    container_name: infra-grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana

  infra-loki:
    image: ${LOKI_IMAGE}
    container_name: infra-loki
    ports:
      - "${LOKI_PORT}:3100"
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./Configs/loki.yml:/etc/loki/local-config.yml
      - loki_data:/loki

  infra-tempo:
    image: ${TEMPO_IMAGE}
    container_name: infra-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    ports:
      - "${TEMPO_PORT}:3200"
      - "${TEMPO_OTLP_GRPC_PORT}:${TEMPO_OTLP_GRPC_CONTAINER_PORT}" # otlp grpc
    volumes:
      - ./Configs/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/temp
volumes:
  postgres_data:
  redis_data:
  kafka_data:
  minio_data:
  qdrant_data:
  etcd_data:
  milvus_data:
  neo4j_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:


